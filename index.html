<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bolo de Aniversário — Animação</title>
    <link rel="stylesheet" href="bolo.css" />
  </head>
  <body>
    <div class="stage" role="img" aria-label="Animação montagem de bolo">
      <div class="birthday-message">
        Feliz aniversário, Minha Princesinha!<br />
        Eu te amo com minha alma, Ana 🤍!
      </div>
      <div class="ui">
        <button id="dropOneBtn">Soltar próxima camada</button>
        <button id="restartBtn">Reiniciar</button>
      </div>
      <div class="caption">Monte o bolo para acender a vela!</div>
      <canvas id="c"></canvas>
    </div>

    <script src="bolo.js"></script>
  </body>
</html>
